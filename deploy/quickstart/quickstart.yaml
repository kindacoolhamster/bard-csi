# Quickstart resources: the demo backend's config, a StorageClass, and a
# PVC + pod that prove the volume works. See docs/quickstart.md.
#
# The plugin config is JSON (the localpath plugin is a stdlib-only Python
# script -- no YAML parser): instance id -> the directory volumes live under.
apiVersion: v1
kind: ConfigMap
metadata:
  name: bard-localpath-config
  namespace: kube-system
data:
  config.json: |
    {
      "instances": {
        "quickstart": { "basePath": "/var/lib/bard-localpath" }
      }
    }
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: bard-quickstart
provisioner: csi.bard.io
parameters:
  backend: localpath
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bard-quickstart
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: bard-quickstart
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: bard-quickstart
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "echo bard-csi-quickstart-works > /data/hello && sleep 3600"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: bard-quickstart
