# Strategic-merge patch adding the iSCSI plugin sidecar to Bard's node DaemonSet.
#   kubectl -n kube-system patch daemonset bard-csi-node \
#     --type=strategic --patch-file deploy/examples/iscsi/sidecar-node.patch.yaml
#
# Node-plane: logs the LUN in (iscsiadm, under a dedicated iface carrying this
# node's derived initiator IQN -- so the host's global initiatorname is untouched),
# then formats + mounts. Needs hostNetwork to reach the portal, the host /dev to
# see the new /dev/sdX, and the kubelet dir with Bidirectional propagation.
# The pod passes its node name to --node-id (the source of the initiator IQN the
# controller put in the ACL).
#
# iscsiadm runs CHROOTED into the host root (--iscsiadm-chroot=/host): iscsiadm
# and iscsid are a version-matched pair with distro-specific DB paths, so a
# container-shipped iscsiadm driving the HOST's iscsid writes CHAP/node records
# where the daemon never looks and the login dies in negotiation (found live:
# LIO "iSCSI Login negotiation failed" until the host's own stack was used).
# The host must run iscsid (every distro's iscsi-initiator package does).
spec:
  template:
    spec:
      hostNetwork: true
      volumes:
        - name: iscsi-config
          configMap:
            name: bard-iscsi-config
        # The whole host root, for the iscsiadm chroot (see header comment).
        - name: host-root
          hostPath: { path: / }
        # Session state (--state-dir) MUST survive plugin pod restarts: it is
        # what NodeUnstage uses to log the session out, and a restart between
        # stage and unstage would otherwise leak the session (the plugin also
        # derives a fallback, but persisted state is the primary path).
        - name: iscsi-state
          hostPath: { path: /var/lib/bard/iscsi, type: DirectoryOrCreate }
        # Per-instance CHAP credentials (only read for instances with chapAuth:
        # true); optional so a CHAP-less deploy needs no Secret.
        - name: iscsi-chap
          secret:
            secretName: bard-iscsi-chap
            optional: true
      containers:
        - name: iscsi-plugin
          image: ghcr.io/kindacoolhamster/bard-plugin-iscsi:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--socket=/var/lib/bard/plugins/iscsi.sock"
            - "--config=/etc/bard-iscsi/config.yaml"
            - "--node-id=$(NODE_ID)"
            - "--iscsiadm-chroot=/host"
          env:
            - name: NODE_ID
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
          securityContext:
            privileged: true
          volumeMounts:
            - { name: plugins, mountPath: /var/lib/bard/plugins }
            - { name: iscsi-config, mountPath: /etc/bard-iscsi, readOnly: true }
            - { name: dev-dir, mountPath: /dev }
            - { name: host-root, mountPath: /host }
            - { name: iscsi-state, mountPath: /var/lib/bard/iscsi }
            - { name: iscsi-chap, mountPath: /etc/bard-iscsi-chap, readOnly: true }
            - { name: kubelet-dir, mountPath: /var/lib/kubelet, mountPropagation: Bidirectional }
