# iSCSI plugin config + a StorageClass + the BackendCluster that registers it.
# See README.md in this dir for the sidecar patches and the attach overlay this
# backend requires (it is the only attach-style backend).
#
# The iSCSI plugin's own config: instance id -> { VG to carve LUN block devices
# from, the portal nodes connect to, the IQN prefix for derived names, an
# optional thin pool (enables snapshots/clone), and whether to enforce CHAP }.
# Access is masked per-node via ACLs; CHAP credentials live in the bard-iscsi-chap
# Secret (below), NEVER in this ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: bard-iscsi-config
  namespace: kube-system
data:
  config.yaml: |
    instances:
      galileo:
        vg: bard-vg
        portal: 192.0.2.1:3260
        # portals: ["192.0.2.1:3260", "192.0.2.2:3260"]
        #                                # 2+ entries turn on dm-multipath: the target gets one
        #                                # explicit LIO portal per address, the node logs in to
        #                                # all of them and mounts the multipathd-assembled mapper
        #                                # device. Needs multipathd running on every node (host
        #                                # prereq, like iscsid). Overrides `portal` when set.
        # iqnBase: iqn.2025-01.io.bard   # default; target/initiator names derive from it
        # thinPool: bard-thin            # provision thin LVs from this pool -> snapshots/clone
        #                                # (pre-create: lvcreate --type thin-pool -L <size> -n bard-thin <vg>;
        #                                #  the thinPool StorageClass param overrides per class)
        # chapAuth: true                 # require CHAP; credentials from the Secret below
---
# Per-instance CHAP credentials, mounted at /etc/bard-iscsi-chap/<instance> in
# both plugin sidecars (the controller sets them on each node's ACL, the node
# logs in with them). One key per instance with chapAuth: true; 2 lines
# (userid, password) or 4 (plus a mutual userid/password pair). The mount is
# optional in the sidecar patches, so skip this Secret entirely without CHAP.
# apiVersion: v1
# kind: Secret
# metadata:
#   name: bard-iscsi-chap
#   namespace: kube-system
# stringData:
#   galileo: |
#     bard
#     use-a-long-random-secret-here
---
apiVersion: bard.io/v1alpha1
kind: BackendCluster
metadata:
  name: galileo-iscsi
spec:
  backendType: iscsi
  instance: galileo
  zone: galileo
  plugin:
    endpoint: /var/lib/bard/plugins/iscsi.sock
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: bard-iscsi
provisioner: csi.bard.io
parameters:
  backend: iscsi
  # ext4 by default; set csi.storage.k8s.io/fstype to xfs, btrfs, ext3 or ext2.
reclaimPolicy: Delete
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
