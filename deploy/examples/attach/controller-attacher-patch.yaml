# Strategic-merge patch adding the external-attacher sidecar to the controller
# Deployment. Apply with:
#   kubectl -n kube-system patch deployment bard-csi-controller \
#     --type=strategic --patch-file deploy/examples/attach/controller-attacher-patch.yaml
spec:
  template:
    spec:
      containers:
        - name: csi-attacher
          # v4.x is coherent with the other sidecars (Kubernetes 1.34/1.35). It
          # watches VolumeAttachments and calls the driver's ControllerPublishVolume.
          image: registry.k8s.io/sig-storage/csi-attacher:v4.8.1
          args:
            - "--csi-address=$(ADDRESS)"
            - "--leader-election"
            - "--v=2"
          env:
            - name: ADDRESS
              value: /csi/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
