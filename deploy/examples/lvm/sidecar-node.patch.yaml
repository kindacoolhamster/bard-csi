# Strategic-merge patch adding the LVM plugin sidecar to Bard's node DaemonSet.
#   kubectl -n kube-system patch daemonset bard-csi-node \
#     --type=strategic --patch-file deploy/examples/lvm/sidecar-node.patch.yaml
#
# Node-plane: formats + mounts the LV's block device (created by the controller).
# Needs the host /dev to see /dev/<vg>/<lv>, and the kubelet dir with Bidirectional
# propagation so its mounts reach kubelet. (No lvcreate here -- the controller
# owns provisioning in the shared-VG model.)
spec:
  template:
    spec:
      volumes:
        - name: lvm-config
          configMap:
            name: bard-lvm-config
      containers:
        - name: lvm-plugin
          image: ghcr.io/kindacoolhamster/bard-plugin-lvm:dev
          imagePullPolicy: IfNotPresent
          args: ["--socket=/var/lib/bard/plugins/lvm.sock", "--config=/etc/bard-lvm/config.yaml"]
          securityContext:
            privileged: true
          volumeMounts:
            - { name: plugins, mountPath: /var/lib/bard/plugins }
            - { name: lvm-config, mountPath: /etc/bard-lvm, readOnly: true }
            - { name: dev-dir, mountPath: /dev }
            - { name: kubelet-dir, mountPath: /var/lib/kubelet, mountPropagation: Bidirectional }
