# Template for the Ceph plugin's per-instance cephx keys Secret. Copy to
# hack/secret.yaml (gitignored), fill in a key per cluster instance, apply with:
#   kubectl apply -f hack/secret.yaml
#
#   ceph auth get-key client.k8s-csi-test   # prints the key
#
# The Ceph plugin mounts this at /etc/bard-ceph-keys and reads the file named for
# each instance id (e.g. /etc/bard-ceph-keys/galileo). Add one entry per cluster.
apiVersion: v1
kind: Secret
metadata:
  name: bard-ceph-keys
  namespace: kube-system
type: Opaque
stringData:
  galileo: PASTE_CEPHX_KEY_FOR_GALILEO
  # other: PASTE_CEPHX_KEY_FOR_OTHER_CLUSTER
