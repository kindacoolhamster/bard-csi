# Template for the CephFS plugin's per-instance cephx keys Secret. Copy to
# hack/secret-cephfs.yaml (gitignored), fill in a key per instance, apply with:
#   kubectl apply -f hack/secret-cephfs.yaml
#
#   ceph auth get-key client.k8s-cephfs   # prints the key
#
# The plugin mounts this at /etc/bard-cephfs-keys and reads the file named for
# each instance id (e.g. /etc/bard-cephfs-keys/galileo).
apiVersion: v1
kind: Secret
metadata:
  name: bard-cephfs-keys
  namespace: kube-system
type: Opaque
stringData:
  galileo: PASTE_CEPHX_KEY_FOR_GALILEO
