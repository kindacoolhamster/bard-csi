# Template for the Vault token the Ceph plugin uses to read/write per-volume LUKS
# passphrases (the vault-dev KMS provider in deploy/20-config.yaml). Copy to
# hack/secret-vault-token.yaml (gitignored) and fill in a token, then apply:
#   kubectl apply -f hack/secret-vault-token.yaml
#
# The plugin mounts this at /etc/bard-ceph-vault/token (tokenFile in the KMS
# config). In production prefer a short-lived token from Vault's Kubernetes auth
# (AppRole / k8s auth) over a static token; this example uses a static token for
# the dev Vault.
#
# The Secret key MUST be `token` so it lands at /etc/bard-ceph-vault/token.
apiVersion: v1
kind: Secret
metadata:
  name: bard-ceph-vault-token
  namespace: kube-system
type: Opaque
stringData:
  token: PASTE_VAULT_TOKEN
