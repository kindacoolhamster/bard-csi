# Multi-cluster dispatch proof: two PVCs on the SAME StorageClass (bard-rbd),
# each pod pinned (via hostname nodeSelector, so the scheduler still sets the
# selected-node topology) to a node in a different zone. The galileo-zone pod's
# volume is provisioned on the galileo instance (pool k8s-csi-test); the
# kepler-zone pod's on the kepler instance (pool k8s-csi-kepler). One class, two
# clusters, picked by where the pod landed.
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: mc-galileo }
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: bard-rbd
  resources: { requests: { storage: 1Gi } }
---
apiVersion: v1
kind: Pod
metadata: { name: mc-galileo }
spec:
  nodeSelector: { kubernetes.io/hostname: bard-worker }   # zone galileo
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh","-c","echo on-galileo > /data/where.txt && sync && cat /data/where.txt && sleep 3600"]
      volumeMounts: [{ name: vol, mountPath: /data }]
  volumes:
    - name: vol
      persistentVolumeClaim: { claimName: mc-galileo }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: mc-kepler }
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: bard-rbd
  resources: { requests: { storage: 1Gi } }
---
apiVersion: v1
kind: Pod
metadata: { name: mc-kepler }
spec:
  nodeSelector: { kubernetes.io/hostname: bard-worker2 }   # zone kepler
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh","-c","echo on-kepler > /data/where.txt && sync && cat /data/where.txt && sleep 3600"]
      volumeMounts: [{ name: vol, mountPath: /data }]
  volumes:
    - name: vol
      persistentVolumeClaim: { claimName: mc-kepler }
