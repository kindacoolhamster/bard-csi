# Template for the Ceph plugin's per-instance LUKS master keys Secret. Copy to
# hack/secret-encryption.yaml (gitignored), fill in a master key per cluster
# instance, apply with:
#   kubectl apply -f hack/secret-encryption.yaml
#
# Generate a strong master key, e.g.:
#   openssl rand -base64 48
#
# The Ceph plugin mounts this at /etc/bard-ceph-encryption and reads the file
# named for each instance id (e.g. /etc/bard-ceph-encryption/galileo). For an
# encrypted volume it HKDF-derives a per-volume LUKS passphrase from the
# instance's master key, so every volume gets a distinct key with no key state
# stored. KEEP THESE KEYS SAFE AND BACKED UP: losing an instance's master key
# makes every encrypted volume on it unrecoverable.
apiVersion: v1
kind: Secret
metadata:
  name: bard-ceph-encryption
  namespace: kube-system
type: Opaque
stringData:
  galileo: PASTE_MASTER_KEY_FOR_GALILEO
  # other: PASTE_MASTER_KEY_FOR_OTHER_CLUSTER
