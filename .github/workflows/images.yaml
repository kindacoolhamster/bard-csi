# CD: build + push the core and plugin images to GHCR, with supply-chain
# artifacts: BuildKit SBOM + provenance attestations attached to each image, and
# a keyless cosign signature over each digest (Fulcio cert bound to this
# workflow's OIDC identity -- see RELEASING.md for the verify commands).
#
# Runs on a version tag (v1.2.3) or manually; not needed for local dev
# (CLAUDE.md builds with podman).
#
# Demonstrates the build-arg story from docs/hardened-images.md: RUNTIME_BASE is
# threaded through, so a hardened variant is a single input -- no Dockerfile fork.
name: images

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      runtime_base:
        description: "Override RUNTIME_BASE (e.g. cgr.dev/chainguard/static). Blank = Dockerfile default."
        required: false
        default: ""

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # keyless cosign signing (Fulcio OIDC)
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: bard-csi,                dockerfile: Dockerfile }
          - { image: bard-plugin-ceph-rbd,    dockerfile: Dockerfile.plugin-ceph-rbd }
          - { image: bard-plugin-cephfs,      dockerfile: Dockerfile.plugin-cephfs }
          - { image: bard-plugin-nfs,         dockerfile: Dockerfile.plugin-nfs }
          - { image: bard-plugin-lvm,         dockerfile: Dockerfile.plugin-lvm }
          - { image: bard-plugin-iscsi,       dockerfile: Dockerfile.plugin-iscsi }
          - { image: bard-plugin-localpath,   dockerfile: Dockerfile.plugin-localpath }
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha

      # RUNTIME_BASE is only forwarded when the manual input is set; otherwise the
      # Dockerfile default (distroless for core, Debian-slim for tool plugins)
      # stands. This is the seam for a hardened build -- see docs/hardened-images.md.
      - name: Build args
        id: args
        run: |
          if [ -n "${{ github.event.inputs.runtime_base }}" ]; then
            echo "build_args=RUNTIME_BASE=${{ github.event.inputs.runtime_base }}" >> "$GITHUB_OUTPUT"
          else
            echo "build_args=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Supply-chain attestations, attached to the image in the registry:
          # an SPDX SBOM per platform and SLSA provenance describing this build.
          sbom: true
          provenance: mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            ${{ steps.args.outputs.build_args }}

      # Keyless signature over the multi-arch digest. Signing the digest (not a
      # tag) covers every tag pointing at it; the Fulcio certificate binds the
      # signature to THIS workflow file in THIS repo, which is what consumers
      # verify (see RELEASING.md).
      - name: Sign the image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
